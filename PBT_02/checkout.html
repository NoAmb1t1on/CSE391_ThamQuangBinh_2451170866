<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán đơn hàng - E-Commerce</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        legend { font-weight: bold; padding: 0 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .radio-group label { display: inline; font-weight: normal; margin-right: 15px; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1>Thanh toán đơn hàng</h1>

    <section>
        <h2>1. Chi tiết giỏ hàng</h2>
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>iPhone 16 Pro Max</td>
                    <td>34.990.000đ</td>
                    <td>1</td>
                    <td>34.990.000đ</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Ốp lưng MagSafe</td>
                    <td>1.290.000đ</td>
                    <td>2</td>
                    <td>2.580.000đ</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Củ sạc USB-C 20W</td>
                    <td>590.000đ</td>
                    <td>1</td>
                    <td>590.000đ</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align: right; font-weight: bold;">Tổng cộng:</td>
                    <td style="color: red; font-weight: bold;">38.160.000đ</td>
                </tr>
            </tfoot>
        </table>
    </section>

    <form action="#" method="POST">
        <fieldset>
            <legend>2. Thanh toán & Ưu đãi</legend>
            
            <div class="form-group radio-group">
                <label>Phương thức thanh toán:</label>
                <input type="radio" id="cod" name="payment" value="COD" checked>
                <label for="cod">COD (Thanh toán khi nhận hàng)</label><br>
                
                <input type="radio" id="bank" name="payment" value="Bank">
                <label for="bank">Chuyển khoản ngân hàng</label><br>
                
                <input type="radio" id="wallet" name="payment" value="Wallet">
                <label for="wallet">Ví điện tử (Momo/ZaloPay)</label>
            </div>

            <div class="form-group">
                <label for="voucher">Mã giảm giá (Nếu có):</label>
                <input type="text" id="voucher" name="voucher" 
                       pattern="SALE[0-9]{4}" 
                       placeholder="VD: SALE2026">
            </div>

            <div class="form-group">
                <label for="note">Ghi chú đơn hàng:</label>
                <textarea id="note" name="note" rows="3" placeholder="Ghi chú về giao hàng hoặc xuất hóa đơn..."></textarea>
            </div>
        </fieldset>

        <fieldset>
            <legend>3. Vận chuyển</legend>

            <div class="form-group">
                <label for="delivery_date">Ngày giao hàng mong muốn:</label>
                <input type="date" id="delivery_date" name="delivery_date" min="2026-05-11" required>
            </div>

            <div class="form-group">
                <label for="time_slot">Khung giờ nhận hàng:</label>
                <select id="time_slot" name="time_slot" required>
                    <option value="" disabled selected>Chọn khung giờ...</option>
                    <option value="morning">Sáng (8h - 12h)</option>
                    <option value="afternoon">Chiều (14h - 18h)</option>
                    <option value="evening">Tối (18h - 21h)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="delivery_range">Thời gian giao hàng tối đa (1 - 7 ngày):</label>
                <input type="range" id="delivery_range" name="delivery_range" 
                       min="1" max="7" step="1" value="3" 
                       oninput="this.nextElementSibling.value = this.value + ' ngày'">
                <output>3 ngày</output>
            </div>
        </fieldset>

        <button type="submit" aria-label="Xác nhận đặt hàng">ĐẶT HÀNG NGAY</button>
    </form>

</body>
</html>
