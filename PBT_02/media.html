<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm Multimedia - iPhone 16 Series</title>
</head>
<body>

    <header>
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="80" height="80" rx="15" fill="#333" />
            <circle cx="50" cy="50" r="25" fill="#fff" />
            <text x="50" y="55" font-size="12" text-anchor="middle" fill="#333" font-family="Arial">LOGO</text>
        </svg>
        <h1>Giới thiệu iPhone 16 Pro</h1>
    </header>

    <hr>

    <section>
        <h2>Bộ sưu tập hình ảnh</h2>
        
        <figure>
            <img src="https://picsum.photos/id/160/800/600" 
                 alt="iPhone 16 Pro màu Titan Sa Mạc nhìn từ mặt trước" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Thiết kế màn hình tràn viền cực đại trên iPhone 16 Pro.</figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/0/800/600" 
                 alt="Cận cảnh hệ thống camera 3 ống kính mới" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Hệ thống Camera chuyên nghiệp nâng cấp cảm biến chính.</figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/1/800/600" 
                 alt="iPhone 16 Pro nằm cạnh các phụ kiện chính hãng" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Hệ sinh thái phụ kiện MagSafe đa dạng.</figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Trailer chính thức (YouTube)</h2>
        <iframe width="560" height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
    </section>

    <hr>

    <section>
        <h2>Trải nghiệm tính năng quay phim</h2>
        <video controls poster="https://picsum.photos/id/2/800/450" style="max-width: 100%;">
            <source src="video-sample.mp4" type="video/mp4">
            <source src="video-sample.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ xem video trực tiếp.
        </video>
    </section>

    <hr>

    <section>
        <h2>Nhạc nền giới thiệu sản phẩm</h2>
        <audio controls>
            <source src="background-music.mp3" type="audio/mpeg">
            <source src="background-music.ogg" type="audio/ogg">
            Trình duyệt của bạn không hỗ trợ nghe nhạc.
        </audio>
    </section>

</body>
</html>
